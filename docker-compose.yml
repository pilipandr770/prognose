services:
  postgres:
    image: postgres:16-alpine
    container_name: prognose-postgres
    environment:
      POSTGRES_DB: prognose
      POSTGRES_USER: prognose
      POSTGRES_PASSWORD: prognose
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prognose -d prognose"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prognose-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
